[defaults]
inventory = Inventory/hosts.ini
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
roles_path = ./roles
deprecation_warnings = False

[persistent_connection]
connect_timeout = 30
command_timeout = 60

[paramiko_connection]
# CRITICAL for your current error
look_for_keys = False
allow_agent = False

[ssh_connection]
pipelining = True

# OpenSSH options (useful if any tasks use the ssh connection plugin)
ssh_args = -oKexAlgorithms=+diffie-hellman-group1-sha1 \
           -oHostKeyAlgorithms=+ssh-rsa \
           -oPubkeyAcceptedAlgorithms=+ssh-rsa \
           -oMACs=+hmac-sha1,hmac-sha1-96 \
           -oStrictHostKeyChecking=no \
           -oUserKnownHostsFile=/dev/null \
           -oPreferredAuthentications=password \
           -oPasswordAuthentication=yes \
           -oPubkeyAuthentication=no