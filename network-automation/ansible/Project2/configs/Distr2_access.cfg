router ospf 1
 router-id 2.2.2.2
interface GigabitEthernet0/2
 description L2_link_to_ACC1
 switchport trunk allowed vlan 10,20
 switchport trunk encapsulation dot1q
 switchport mode trunk
interface GigabitEthernet0/1
 description L2_link_to_ACC2
 switchport trunk allowed vlan 20,30
 switchport trunk encapsulation dot1q
 switchport mode trunk
interface GigabitEthernet0/0
 description L2_link_to_ACC3
 switchport trunk allowed vlan 30,40
 switchport trunk encapsulation dot1q
 switchport mode trunk
interface Vlan10
 ip address 10.10.10.2 255.255.255.0
 standby 10 ip 10.10.10.10
 standby 10 priority 90
 standby 10 preempt
 ip ospf 1 area 0
interface Vlan20
 ip address 10.10.20.2 255.255.255.0
 standby 20 ip 10.10.20.20
 standby 20 priority 110
 standby 20 preempt
 ip ospf 1 area 0
interface Vlan30
 ip address 10.10.30.2 255.255.255.0
 standby 30 ip 10.10.30.30
 standby 30 priority 90
 standby 30 preempt
 ip ospf 1 area 0
interface Vlan40
 ip address 10.10.40.2 255.255.255.0
 standby 40 ip 10.10.40.10
 standby 40 priority 110
 standby 40 preempt
 ip ospf 1 area 0
interface GigabitEthernet1/0
 description L3_link_to_Core4
 no switchport
 ip address 10.2.4.2 255.255.255.0
 ip ospf 1 area 0
interface GigabitEthernet1/1
 description L3_link_to_Core3
 no switchport
 ip address 10.2.3.2 255.255.255.0
 ip ospf 1 area 0
    
interface GigabitEthernet0/3
 description Po1_member_to_Distr1
 no switchport
 no ip address
 channel-group 10 mode auto
interface GigabitEthernet1/3
 description Po1_member_to_Distr1
 no switchport
 no ip address
 channel-group 10 mode auto

interface Port-channel10
 no switchport
 ip address 10.1.2.2 255.255.255.0
 ip ospf 1 area 0
vlan 10
name Sales
vlan 20
name Accounting
vlan 30
name HR
vlan 40
name Guests
 